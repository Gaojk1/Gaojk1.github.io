<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jquery.min.js"></script>
    <title>花咪吃吃网</title>
    <style>
        body{
            background-image: url("img/bg.jpg");
        }
        h3{
            color: darkmagenta;
        }
        .img{
            float: left;
            height: 400px;
            width: 480px;
            align-items:center;
        }
        .div3_img{
            float: none;
        }
        .div4{
            float: none;
            font-family: "Bernard MT Condensed";
            color: darkmagenta;
            text-align: left;
            font-size: large;
        }
    </style>
</head>
<body>
    <div>
        <img src="img/bg1.png" width="100%">
    </div>
    <marquee>
        <h3>我是小猫咪&nbsp;&nbsp;爱吃椰子鸡&nbsp;&nbsp;要论吃货谁第一&nbsp;&nbsp;当然本猫咪&nbsp;&nbsp;欢迎来到猫咪吃吃网</h3>
    </marquee>
    <div class="div4">
        <h1>我是谁</h1>
    </div>

    <div class="div3_img" class="container-fluid">
        <div class="img row">
            <img src="img/cat1.jpg" class="col-sm-12 col-sm-12 col-md-10">
        </div>
        <div class="img row">
            <img src="img/cat2.jpg" class="col-sm-12 col-sm-12 col-md-10">
        </div>
        <div class="img row">
            <img src="img/cat3.jpg" class="col-sm-12 col-sm-12 col-md-10">
        </div>
    </div>
    <div class="div4" style="clear:both">
        <h1>本咪最爱</h1>
    </div>
    <div class="div3_img container-fluid">
        <div class="img row">
            <img src="img/food1.jpg" class="col-sm-12 col-sm-12 col-md-10">
        </div>
        <div class="img" class="row">
            <img src="img/food2.jpg" class="col-sm-12 col-sm-12 col-md-10">
        </div>
        <div class="img" class="row">
            <img src="img/food3.jpg" class="col-sm-12 col-sm-12 col-md-10">
        </div>
    </div>
</body>
</html>
